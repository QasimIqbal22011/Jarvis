<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --orange: #ff8c2b;
    --orange-bright: #ffb066;
    --orange-dim: #a8551a;
    --bg-dark: #14100c;
    --bubble-jarvis: #241d17;
  }

  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: transparent;
    width: 100%; height: 100%;
    font-family: "Segoe UI", Arial, sans-serif;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    border-radius: 18px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(20,16,12,0.92) 0%, rgba(12,9,7,0.96) 100%);
    border: 1px solid rgba(255,140,43,0.25);
    box-shadow: 0 0 40px rgba(255,120,30,0.15);
  }

  /* Small draggable strip at the very top (avoids fighting with chat scroll) */
  #drag-handle {
    height: 16px;
    width: 100%;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }

  #sphere-container {
    position: relative;
    width: 100%;
    height: 230px;
    flex-shrink: 0;
  }

  #sphere-container canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #status-label {
    position: absolute;
    bottom: 6px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
    opacity: 0.75;
    pointer-events: none;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255,140,43,0.35); border-radius: 3px; }
  #chat::-webkit-scrollbar-track { background: transparent; }

  .bubble {
    max-width: 78%;
    padding: 8px 12px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.35;
    word-wrap: break-word;
    white-space: pre-wrap;
    opacity: 0;
    transform: translateY(6px);
    animation: bubble-in 0.22s ease-out forwards;
  }

  @keyframes bubble-in {
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble-user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--orange) 0%, #e0651a 100%);
    color: #1a0f06;
    border-bottom-right-radius: 3px;
    box-shadow: 0 2px 8px rgba(255,140,43,0.25);
  }

  .bubble-jarvis {
    align-self: flex-start;
    background: var(--bubble-jarvis);
    color: #f1d9bf;
    border: 1px solid rgba(255,140,43,0.25);
    border-bottom-left-radius: 3px;
  }

  .bubble-label {
    display: block;
    font-size: 9.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 2px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="drag-handle"></div>
  <div id="sphere-container">
    <div id="status-label">idle</div>
  </div>
  <div id="chat"></div>
</div>

<script src="three.min.js"></script>
<script>
/* ---------------- Chat log ---------------- */
const chatEl = document.getElementById('chat');

function addMessage(sender, text) {
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (sender === 'user' ? 'bubble-user' : 'bubble-jarvis');

  const label = document.createElement('span');
  label.className = 'bubble-label';
  label.textContent = sender === 'user' ? 'You' : 'Jarvis';
  bubble.appendChild(label);

  const body = document.createElement('span');
  body.textContent = text;
  bubble.appendChild(body);

  chatEl.appendChild(bubble);
  chatEl.scrollTop = chatEl.scrollHeight;
}
window.addMessage = addMessage;

function clearChat() {
  chatEl.innerHTML = '';
}
window.clearChat = clearChat;

/* ---------------- 3D sphere ---------------- */
const container = document.getElementById('sphere-container');
const statusLabel = document.getElementById('status-label');

let state = 'idle';
let energy = 0.15;
let targetEnergy = 0.15;
let prevState = null;
let thinkingSeed = Math.random() * 1000;

function setJarvisState(s) {
  if (s !== prevState && s === 'thinking') {
    // fresh random seed each time we start thinking, so the erratic
    // pulse pattern doesn't look identical every turn
    thinkingSeed = Math.random() * 1000;
  }
  prevState = s;
  state = s;
  statusLabel.textContent = s;
  if (s === 'idle') targetEnergy = 0.15;
  else if (s === 'listening') targetEnergy = 0.55;
  else if (s === 'thinking') targetEnergy = 0.5;
  else if (s === 'speaking') targetEnergy = 1.0;
}
window.setJarvisState = setJarvisState;

/* ---------------- Live audio level (0-1), pushed from Python ---------------- */
let audioLevel = 0;
let smoothedAudioLevel = 0;

function setAudioLevel(v) {
  audioLevel = Math.max(0, Math.min(1, v));
}
window.setAudioLevel = setAudioLevel;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.z = 220;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio || 1);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setClearColor(0x000000, 0);
container.appendChild(renderer.domElement);

const group = new THREE.Group();
scene.add(group);

const baseRadius = 66;
const PARTICLE_COUNT = 900;
const MAX_LINKS_PER_POINT = 3;

// --- Distribute particles evenly over a sphere (Fibonacci sphere) ---
function fibonacciSpherePoints(count, radius) {
  const pts = [];
  const offset = 2 / count;
  const increment = Math.PI * (3 - Math.sqrt(5)); // golden angle
  for (let i = 0; i < count; i++) {
    const y = (i * offset) - 1 + (offset / 2);
    const r = Math.sqrt(Math.max(0, 1 - y * y));
    const phi = i * increment;
    const x = Math.cos(phi) * r;
    const z = Math.sin(phi) * r;
    // slight per-particle radius jitter so it doesn't look perfectly uniform
    const jitter = 1 + (Math.random() - 0.5) * 0.04;
    pts.push(new THREE.Vector3(x, y, z).multiplyScalar(radius * jitter));
  }
  return pts;
}

const particlePositions = fibonacciSpherePoints(PARTICLE_COUNT, baseRadius);

// --- Soft round glow sprite used for every particle dot ---
function makeGlowTexture() {
  const size = 64;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const cx2d = c.getContext('2d');
  const g = cx2d.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.35, 'rgba(255,190,110,0.9)');
  g.addColorStop(1, 'rgba(255,120,30,0)');
  cx2d.fillStyle = g;
  cx2d.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}
const glowTexture = makeGlowTexture();

// --- Particle points geometry (positions + per-point color/size variance) ---
const posArray = new Float32Array(PARTICLE_COUNT * 3);
const colorArray = new Float32Array(PARTICLE_COUNT * 3);
const sizeArray = new Float32Array(PARTICLE_COUNT);
const basePositions = new Float32Array(PARTICLE_COUNT * 3);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const p = particlePositions[i];
  posArray[i * 3] = p.x; posArray[i * 3 + 1] = p.y; posArray[i * 3 + 2] = p.z;
  basePositions[i * 3] = p.x; basePositions[i * 3 + 1] = p.y; basePositions[i * 3 + 2] = p.z;

  const brightness = 0.55 + Math.random() * 0.45;
  colorArray[i * 3] = 1.0 * brightness;
  colorArray[i * 3 + 1] = 0.55 * brightness;
  colorArray[i * 3 + 2] = 0.18 * brightness;

  sizeArray[i] = 1.6 + Math.random() * 2.2;
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizeArray, 1));

const particleMat = new THREE.PointsMaterial({
  size: 3.2,
  map: glowTexture,
  vertexColors: true,
  transparent: true,
  opacity: 0.9,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
});
const particles = new THREE.Points(particleGeo, particleMat);
group.add(particles);

// --- Connect nearby particles with thin glowing lines (constellation web) ---
function buildConnections(points, maxLinksPerPoint) {
  const n = points.length;
  const edgeSet = new Set();
  for (let i = 0; i < n; i++) {
    const dists = [];
    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      dists.push({ j, d: points[i].distanceToSquared(points[j]) });
    }
    dists.sort((a, b) => a.d - b.d);
    for (let k = 0; k < maxLinksPerPoint && k < dists.length; k++) {
      const a = Math.min(i, dists[k].j), b = Math.max(i, dists[k].j);
      edgeSet.add(a + '_' + b);
    }
  }
  return Array.from(edgeSet).map(key => key.split('_').map(Number));
}

const edges = buildConnections(particlePositions, MAX_LINKS_PER_POINT);
const linePositions = new Float32Array(edges.length * 2 * 3);
edges.forEach(([a, b], idx) => {
  const pa = particlePositions[a], pb = particlePositions[b];
  linePositions[idx * 6] = pa.x; linePositions[idx * 6 + 1] = pa.y; linePositions[idx * 6 + 2] = pa.z;
  linePositions[idx * 6 + 3] = pb.x; linePositions[idx * 6 + 4] = pb.y; linePositions[idx * 6 + 5] = pb.z;
});

const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
const lineMat = new THREE.LineBasicMaterial({
  color: 0xff8c2b,
  transparent: true,
  opacity: 0.18,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const lines = new THREE.LineSegments(lineGeo, lineMat);
group.add(lines);

// --- Bright core glow (the "power source" at the center) ---
const coreSprite = new THREE.Sprite(new THREE.SpriteMaterial({
  map: glowTexture,
  color: 0xffdca0,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
}));
coreSprite.scale.set(26, 26, 1);
group.add(coreSprite);

const pointLight = new THREE.PointLight(0xffaa55, 2.0, 500);
pointLight.position.set(0, 0, 0);
scene.add(pointLight);
const ambient = new THREE.AmbientLight(0x331a00, 0.6);
scene.add(ambient);

let t = 0;

/* --- Random-walk angular velocity on all three axes, so rotation drifts
   direction instead of spinning around one fixed axis forever --- */
const angVel = { x: 0.0015, y: 0.003, z: 0.001 };
const angVelTarget = { x: 0, y: 0, z: 0 };
let nextVelChangeAt = 0;

function updateRotation() {
  if (t > nextVelChangeAt) {
    // energy/state pushes how fast+wide the drift can swing
    const spread = 0.004 + energy * 0.018;
    angVelTarget.x = (Math.random() - 0.5) * spread;
    angVelTarget.y = (Math.random() - 0.5) * spread;
    angVelTarget.z = (Math.random() - 0.5) * spread;
    // faster re-rolls when more "alive" (listening/thinking/speaking)
    nextVelChangeAt = t + (1.2 + Math.random() * 2.2) / (0.6 + energy);
  }
  angVel.x += (angVelTarget.x - angVel.x) * 0.02;
  angVel.y += (angVelTarget.y - angVel.y) * 0.02;
  angVel.z += (angVelTarget.z - angVel.z) * 0.02;

  group.rotation.x += angVel.x * 16.6;
  group.rotation.y += angVel.y * 16.6;
  group.rotation.z += angVel.z * 16.6;
}

/* --- Whole-sphere zoom in/out pulse, meaning depends on state:
   listening -> reacts to your live mic volume
   speaking  -> reacts to Jarvis's own speech cadence/volume
   thinking  -> erratic, non-periodic pulse (no real audio to react to)
   idle      -> small steady breathing --- */
function updatePulseScale() {
  // Python pushes a new target ~20x/sec; this interpolation just smooths
  // the gaps between those updates into a continuous glide.
  smoothedAudioLevel += (audioLevel - smoothedAudioLevel) * 0.18;

  let scale = 1;
  if (state === 'listening') {
    scale = 1 + smoothedAudioLevel * 0.5;
  } else if (state === 'speaking') {
    scale = 1 + smoothedAudioLevel * 0.55;
  } else if (state === 'thinking') {
    const n = Math.sin(t * 2.7 + thinkingSeed) * 0.5
            + Math.sin(t * 5.3 + thinkingSeed * 1.3) * 0.3
            + Math.sin(t * 1.1 + thinkingSeed * 0.7) * 0.2;
    scale = 1 + n * 0.16;
  } else {
    scale = 1 + Math.sin(t * 0.6) * 0.03;
  }
  group.scale.setScalar(scale);
}

function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  energy += (targetEnergy - energy) * 0.05;

  // Gentle per-particle shimmer: slight radial breathing, phase offset per particle
  const posAttr = particleGeo.attributes.position;
  const breathAmp = 0.01 + energy * 0.035;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const ix = i * 3;
    const bx = basePositions[ix], by = basePositions[ix + 1], bz = basePositions[ix + 2];
    const phase = i * 0.37;
    const wobble = 1 + Math.sin(t * 1.4 + phase) * breathAmp;
    posAttr.setXYZ(i, bx * wobble, by * wobble, bz * wobble);
  }
  posAttr.needsUpdate = true;

  updateRotation();
  updatePulseScale();

  const speakingOrListening = (state === 'speaking') ? smoothedAudioLevel : (state === 'listening' ? smoothedAudioLevel * 0.7 : 0);
  particleMat.size = 2.6 + energy * 2.2 + speakingOrListening * 2.0 + Math.sin(t * (state === 'speaking' ? 7 : 2.5)) * 0.2 * energy;
  particleMat.opacity = 0.7 + energy * 0.3;
  lineMat.opacity = 0.1 + energy * 0.25;

  const corePulse = 1 + Math.sin(t * (state === 'speaking' ? 8 : 3)) * (0.1 + energy * 0.2) + speakingOrListening * 0.3;
  coreSprite.scale.set(22 * corePulse * (0.7 + energy * 0.6), 22 * corePulse * (0.7 + energy * 0.6), 1);
  pointLight.intensity = 1.2 + energy * 2.5 + speakingOrListening * 1.5;

  renderer.render(scene, camera);
}
animate();

function onResize() {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);
</script>
</body>
</html>
